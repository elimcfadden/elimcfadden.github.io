    <div class="hero" style="background-image:url('images/herojobs.jpg')"></div>
    <main>
      
  <section class="card">
    <h2>Jobs</h2>
    <p>We’re always looking for friendly baristas. Bring your resume to the counter or email us.</p>
    <form aria-label="Apply for a job at JavaJam">
      <p>
        <label for="name">Name</label><br>
        <input id="name" name="name" required>
      </p>
      <p>
        <label for="email">Email</label><br>
        <input id="email" name="email" type="email" required>
      </p>
      <p>
        <label for="message">Tell us a bit about you</label><br>
        <textarea id="message" name="message" rows="4"></textarea>
      </p>
      <p><button type="submit">Send</button></p>
    </form>
  </section>

    </main>
    <footer>
      <p>&copy; JavaJam Coffee Bar • <a href="mailto:you@example.com">you@example.com</a></p>
      <p id="dateupdate"></p>
      <script src="js/dateupdate.js"></script>
    </footer>
